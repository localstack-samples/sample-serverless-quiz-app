# lstk per-project config for the Serverless Quiz App demo.
# Picked up automatically when `lstk` is invoked from this repo's root.

[[containers]]
type = "aws"
tag  = "latest"
port = "4566"
env  = ["demo"]

# Extensions used by the demos: EventStudio (event-driven tracing) and MailHog
# (SES email inspection). LocalStack installs these on first start.
#
# LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT bumps the per-invocation cold-start
# timeout from the default 20s to 120s. Lambda execution containers can be
# very slow to start in nested-Docker (sbx sandbox) environments, and the
# default leads to "Timeout while starting up lambda environment" 502s on
# every cold call.
#
# LAMBDA_KEEPALIVE_MS keeps containers warm for 15 minutes after they finally
# come up, so subsequent calls don't re-cold-start.
[env.demo]
EXTENSION_AUTO_INSTALL = "localstack-extension-event-studio,localstack-extension-mailhog"
LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT = "120"
LAMBDA_KEEPALIVE_MS = "900000"
